<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아주대의료원 노동조합 진행사업</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f4fff7;
      color: #222;
    }
    .wrap {
      max-width: 520px;
      margin: auto;
      padding: 30px 20px;
    }
    h1 {
      color: #087a3d;
      text-align: center;
      line-height: 1.4;
    }
    p {
      text-align: center;
      color: #555;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 22px;
      margin: 18px 0;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
    .date {
      color: #087a3d;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .event {
      font-size: 23px;
      font-weight: bold;
      margin-bottom: 18px;
      line-height: 1.4;
    }
    .btn {
      display: block;
      background: #087a3d;
      color: white;
      text-decoration: none;
      text-align: center;
      padding: 15px;
      border-radius: 14px;
      font-weight: bold;
      font-size: 17px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>아주대의료원 노동조합<br>진행사업</h1>
    <p>아래 바로가기를 눌러 신청해주세요.</p>

    <div class="card">
      <div class="date">6월 17일(수)</div>
      <div class="event">보건의료총력투쟁 함께하기!</div>
      <a class="btn" href="https://forms.gle/여기에링크1" target="_blank">바로가기</a>
    </div>

    <div class="card">
      <div class="date">6월 20일(토)</div>
      <div class="event">래프팅 or 빠지 신청하기!</div>
      <a class="btn" href="https://forms.gle/여기에링크2" target="_blank">바로가기</a>
    </div>

    <div class="card">
      <div class="date">9월 5일(토)</div>
      <div class="event">가을캠핑 신청하기!</div>
      <a class="btn" href="https://forms.gle/여기에링크3" target="_blank">바로가기</a>
    </div>
  </div>
</body>
</html>
